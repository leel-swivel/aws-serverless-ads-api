AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ads-api

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON

Resources:

  # ==========================
  # API Gateway
  # ==========================
  AdsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt AdsUserPool.Arn

  # ==========================
  # Lambda Function
  # ==========================
  AdsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/createAd.handler
      Description: Create Ad Lambda
      Environment:
        Variables:
          ADS_TABLE: !Ref AdsTable
          ADS_BUCKET: !Ref AdsBucket
          ADS_TOPIC: !Ref AdsTopic
          IMAGE_MAX_SIZE: 5242880
          PRESIGNED_URL_EXPIRY: 3600
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - S3CrudPolicy:
            BucketName: !Ref AdsBucket
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdsTopic.TopicName
      Events:
        CreateAdApi:
          Type: Api
          Properties:
            RestApiId: !Ref AdsApi
            Path: /api/v1/ads
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - handlers/createAd.ts

  # ==========================
  # DynamoDB
  # ==========================
  AdsTable:
    Type: AWS::Serverless::SimpleTable
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PrimaryKey:
        Name: id
        Type: String

  # ==========================
  # S3 Bucket
  # ==========================
  AdsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties: {}

  # ==========================
  # SNS Topic
  # ==========================
  AdsTopic:
    Type: AWS::SNS::Topic
    Properties: {}

  # ==========================
  # Cognito User Pool
  # ==========================
  AdsUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AutoVerifiedAttributes:
        - email

  # ==========================
  # Cognito App Client
  # ==========================
  AdsUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref AdsUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

Outputs:

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${AdsApi}.execute-api.${AWS::Region}.amazonaws.com/dev/api/v1/ads"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref AdsUserPool

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref AdsUserPoolClient