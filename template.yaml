AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ads-api

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON

  Api:
    Auth:
      DefaultAuthorizer: CognitoAuthorizer
      Authorizers:
        CognitoAuthorizer:
          UserPoolArn: !GetAtt AdsUserPool.Arn

Resources:

  AdsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/createAd.handler
      Description: Create Ad Lambda
      Environment:
        Variables:
          ADS_TABLE: !Ref AdsTable
          ADS_BUCKET: !Ref AdsBucket
          ADS_TOPIC: !Ref AdsTopic
          IMAGE_MAX_SIZE: 5242880
          PRESIGNED_URL_EXPIRY: 3600
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - S3CrudPolicy:
            BucketName: !Ref AdsBucket
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdsTopic.TopicName
      Events:
        CreateAdApi:
          Type: Api
          Properties:
            Path: /ads
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - handlers/createAd.ts

  AdsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: AdsTable
      PrimaryKey:
        Name: id
        Type: String

  AdsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ads-bucket-${AWS::AccountId}"

  AdsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: AdsTopic

  AdsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: AdsUserPool
      AutoVerifiedAttributes:
        - email

  AdsUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AdsUserPoolClient
      UserPoolId: !Ref AdsUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/ads"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref AdsUserPool

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref AdsUserPoolClient