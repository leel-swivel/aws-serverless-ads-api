AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ads-api

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON

Resources:
  AdsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/createAd.handler
      Description: Create Ad Lambda
      Environment:
        Variables:
          ADS_TABLE: !Ref AdsTable
          ADS_BUCKET: !Ref AdsBucket
          ADS_TOPIC: !Ref AdsTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - S3CrudPolicy:
            BucketName: !Ref AdsBucket
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AdsTopic.TopicName
      Events:
        CreateAdApi:
          Type: Api
          Properties:
            Path: /ads
            Method: POST

    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/createAd.ts